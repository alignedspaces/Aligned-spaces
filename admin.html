<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Aligned Spaces CRM</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #FDFBF7; /* Warm Ivory */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .login-container {
      background-color: #ffffff;
      padding: 50px 40px;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(44, 43, 41, 0.08);
      width: 100%;
      max-width: 400px;
      text-align: center;
      border: 1px solid #F8F3ED;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      color: #2C2B29;
      margin-bottom: 10px;
      font-size: 28px;
    }
    p {
      color: #5A5957;
      margin-bottom: 30px;
      font-size: 14px;
    }
    .input-group {
      margin-bottom: 20px;
      text-align: left;
    }
    .input-group label {
      display: block;
      font-size: 13px;
      color: #5A5957;
      margin-bottom: 5px;
      font-weight: 500;
    }
    .input-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid #D5BBAE;
      border-radius: 6px;
      font-size: 15px;
      box-sizing: border-box;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-group input:focus {
      border-color: #2C2B29;
    }
    .btn-login {
      width: 100%;
      padding: 14px;
      background-color: #2C2B29;
      color: #FDFBF7;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
      margin-top: 10px;
    }
    .btn-login:hover {
      background-color: #1a1a18;
    }
    .error-message {
      color: #d9534f;
      font-size: 13px;
      margin-top: 15px;
      display: none;
    }
  </style>
<link rel="icon" type="image/png" href="icon.png">
</head>
<body>

  <div class="login-container">
    <h1>Aligned Spaces</h1>
    <p>Admin Control Panel</p>
    
    <div class="input-group">
      <label for="email">Admin Email</label>
      <input type="email" id="email" placeholder="admin@alignedspaces.us">
    </div>
    
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••">
    </div>
    
    <button class="btn-login" id="loginBtn">Secure Login</button>
    <div class="error-message" id="errorMsg">Incorrect email or password.</div>
  </div>

  <!-- Firebase Compat Scripts -->
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>

  <script>
    document.getElementById('loginBtn').addEventListener('click', async () => {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      const btn = document.getElementById('loginBtn');

      if(!email || !password) return;

      try {
        btn.textContent = "Authenticating...";
        await window.auth.signInWithEmailAndPassword(email, password);
        // Success
        window.location.href = 'dashboard.html';
      } catch (error) {
        btn.textContent = "Secure Login";
        errorMsg.style.display = 'block';
        console.error(error);
      }
    });
  </script>
</body>
</html>
