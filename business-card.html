<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aligned Spaces - Business Card</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 40px;
      background-color: #EAE6DF;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      min-height: 100vh;
    }

    /* Standard US Business Card size: 3.5 x 2 inches */
    /* Scaled up for web view */
    .card {
      background-color: #FDFBF7;
      width: 500px;
      height: 285px;
      border-radius: 4px;
      box-shadow: 0 15px 35px rgba(44, 43, 41, 0.1);
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      border: 1px solid #e0dbce;
    }

    /* FRONT DESIGN */
    .front .logo-img {
      max-width: 200px;
      margin-bottom: 25px;
    }
    
    .front .contact-info {
      font-size: 11px;
      color: #5A5957;
      letter-spacing: 1px;
      font-weight: 400;
      line-height: 1.8;
    }

    .front .owner-name {
      font-size: 13px;
      font-weight: 600;
      color: #2C2B29;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    /* BACK DESIGN */
    .back {
      background-color: #FDFBF7;
    }

    .qr-placeholder {
      width: 100px;
      height: 100px;
      border: 1px dashed #D5BBAE;
      margin-bottom: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #D5BBAE;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .back .website {
      font-size: 13px;
      font-weight: 500;
      color: #2C2B29;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .label {
      font-size: 12px;
      color: #8C8173;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: 600;
    }

  </style>
<link rel="icon" type="image/png" href="icon.png">
</head>
<body>

  <div class="label">Frente de la Tarjeta (Front)</div>
  <div class="card front">
    <!-- Using the logo you uploaded -->
    <img src="logo.jpg" alt="Aligned Spaces Logo" class="logo-img">
    
    <div class="owner-name">Stephanie Naranjo</div>
    <div class="contact-info">
      (702) 350-2385<br>
      hello@alignedspaces.us
    </div>
  </div>

  <div class="label" style="margin-top: 20px;">Reverso de la Tarjeta (Back)</div>
  <div class="card back">
    <!-- QR Code Placeholder -->
    <div class="qr-placeholder">
      [ QR CODE ]
    </div>
    <div class="website">
      www.alignedspaces.us
    </div>
  </div>

</body>
</html>
